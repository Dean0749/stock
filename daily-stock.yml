name: 每日台股盤後自動分析

on:
  schedule:
    # 台灣時間 16:30 盤後（UTC 08:30），週一到週五
    - cron: '30 8 * * 1-5'
  workflow_dispatch:  # 允許手動觸發

jobs:
  fetch-and-analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 需要寫入權限才能 commit 結果

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests anthropic

      - name: Fetch TWSE data + AI analysis
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/daily_analysis.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "🤖 每日選股 $(date +%Y-%m-%d)"
          git push
